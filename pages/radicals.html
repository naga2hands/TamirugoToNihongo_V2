<!doctype html>
<div class="legacy-shell">
  <div style="padding:12px;border-bottom:1px solid #e5e7eb;background:#fff;border-radius:15px;margin-bottom:12px;">
    <div style="margin-bottom:8px;font-weight:600;font-size:0.9rem;">Filter by Stroke Order:</div>
    <div id="strokeFilters" class="script-toggle" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="layout-grid">
    <div class="panel" style="min-height:0;display:flex;flex-direction:column;">
      <div class="panel-header">
        <h2 class="panel-title">கான்ஜி கூறுகள்   -   漢字の部首   -   Kanji Radicals</h2>
      </div>
      <div class="tamil-grid" style="padding:12px;flex:1;min-height:0;overflow-y:auto;">
        <div id="radicalGrid" class="kanji-grid" style="display:grid;grid-template-columns:repeat(10,minmax(0,1fr));gap:8px;"></div>
      </div>
    </div>

    <div class="panel panel-explanation" style="min-height:0;display:flex;flex-direction:column;">
      <div class="panel-header">
        <h2 class="panel-title">தேர்வு செய்த கான்ஜியின் கூறு குறித்த விவரங்கள்</h2>
      </div>
      <div id="radicalDetails" style="padding:12px;display:flex;flex-direction:column;gap:8px;min-height:0;overflow-y:auto;">
        <div id="radicalFields"></div>
        <div id="relatedKanjiSection" style="display:none;">
          <h3 style="margin:8px 0;font-size:0.95rem;font-weight:600;">Related Kanji</h3>
          <div id="relatedKanji" style="display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;margin-top:8px;margin-bottom:12px;"></div>
          <div id="kanjiDetailPanel" style="padding:12px;border-top:2px solid #e5e7eb;border-radius:8px;background:#f9fafb;">
            <div id="kanjiDetailContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
